<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greenly — Multi-entity survey prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  :root{
    --primary:#26a551; --primary-hover:#1f8e45; --primary-contrast:#fff;
    --green-50:#e6f6ea; --green-400:#54c073; --green-chip:#c4e8cc;
    --text-primary:rgba(0,0,0,.87); --text-secondary:rgba(0,0,0,.6); --text-disabled:rgba(0,0,0,.38);
    --bg-default:#fafafa; --paper:#fff; --elev2:#eee; --grey200:#eee; --grey400:#bdbdbd;
    --outline:rgba(0,0,0,.08); --outline-strong:#e0e0e0;
    --info-bg:#e3f2fd; --info-border:#bbdefb; --info-text:#0d47a1;
    --indigo-bg:#c7d6ed; --indigo-text:#2a456f;
    --disabled-bg:rgba(0,0,0,.12);
    --radius-xs:4px; --radius-sm:4px; --radius-md:12px; --radius-btn:6px;
    --connector:#bdbdbd;
    /* Figma typography tokens */
    --fs-h2:24px; --lh-h2:32px; --ls-h2:-0.36px;
    --fs-body1:16px; --lh-body1:24px;
    --fs-body2:14px; --lh-body2:20px;
    --fs-caption:12px; --lh-caption:20px;
    --fs-chip:13px; --lh-chip:18px;
    --fw-regular:400; --fw-medium:500; --fw-semibold:600;
    font-family:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--grey200);color:var(--text-primary);font-size:var(--fs-body2);line-height:var(--lh-body2);overflow:hidden;}
  button{font-family:inherit;cursor:pointer;}
  .app{display:flex;height:100vh;width:100vw;background:var(--elev2);}

  /* ---------- Sidebar ---------- */
  .sidebar{width:240px;flex-shrink:0;background:var(--elev2);display:flex;flex-direction:column;justify-content:space-between;padding:24px 16px;overflow-y:auto;}
  .logo{display:flex;align-items:center;padding-left:4px;}
  .logo img{height:24px;width:auto;display:block;}
  .logo span{color:var(--primary);}
  .acct-input{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--outline);border-radius:var(--radius-sm);padding:8px 12px;font-size:16px;width:208px;}
  .acct-input i{font-size:18px;color:var(--text-secondary);} .acct-input .caret{margin-left:auto;color:var(--text-secondary);}
  .ask{display:flex;align-items:center;justify-content:center;gap:8px;height:44px;border-radius:6px;border:none;width:100%;font-weight:600;font-size:14px;color:var(--text-primary);
       background:linear-gradient(88deg,rgba(47,206,101,.15) 27%,rgba(69,207,170,.15) 88%);}
  .ask i{font-size:18px;}
  .nav{display:flex;flex-direction:column;gap:8px;margin-top:24px;}
  .nav-item{display:flex;align-items:center;gap:8px;height:32px;padding:0 12px;border-radius:6px;font-size:14px;color:var(--text-primary);}
  .nav-item.active{background:rgba(0,0,0,.08);font-weight:500;}
  .nav-item i.lead{font-size:18px;} .nav-item .caret{margin-left:auto;font-size:14px;color:var(--text-secondary);}
  .side-foot{display:flex;flex-direction:column;gap:12px;}
  .side-select{display:flex;align-items:center;background:var(--paper);border:1px solid var(--outline);border-radius:var(--radius-sm);padding:8px 12px;font-size:14px;color:var(--text-secondary);}
  .side-select .caret{margin-left:auto;}
  .logout{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--paper);border:1px solid var(--outline);border-radius:var(--radius-sm);padding:8px 16px;font-weight:600;font-size:14px;color:var(--text-primary);}

  /* ---------- Body ---------- */
  .body{flex:1;min-width:0;display:flex;flex-direction:column;padding:8px 8px 8px 0;}
  .main{flex:1;min-height:0;background:var(--bg-default);border-radius:var(--radius-md);display:flex;flex-direction:column;overflow:hidden;}
  .topnav{height:64px;flex-shrink:0;border-bottom:2px solid var(--grey200);display:flex;align-items:center;justify-content:space-between;padding:12px 24px;}
  .crumb{display:flex;align-items:center;gap:8px;font-weight:var(--fw-medium);font-size:var(--fs-body1);line-height:var(--lh-body1);}
  .crumb .muted{color:var(--text-secondary);} .crumb .sep{color:var(--text-secondary);}
  .topnav-actions{display:flex;gap:12px;}
  .btn{border-radius:var(--radius-xs);padding:8px 24px;font-weight:var(--fw-semibold);font-size:var(--fs-body1);line-height:var(--lh-body1);border:none;display:inline-flex;align-items:center;gap:8px;}
  .btn-outline{background:var(--paper);border:1px solid var(--outline);color:var(--text-primary);}
  .btn-disabled{background:var(--disabled-bg);color:var(--text-disabled);cursor:not-allowed;}
  .btn-primary{background:var(--primary);color:var(--primary-contrast);}
  .btn-primary:hover{background:var(--primary-hover);}

  .scroll{flex:1;min-height:0;overflow-y:auto;}
  .header{padding:24px 24px 0;}
  .h-title{display:flex;align-items:center;gap:8px;}
  .h-title h1{font-size:var(--fs-h2);line-height:var(--lh-h2);font-weight:var(--fw-semibold);letter-spacing:var(--ls-h2);margin:0;}
  .chip-acct{display:inline-flex;align-items:center;gap:2px;background:var(--grey200);border-radius:9999px;padding:2px 8px 2px 4px;font-size:13px;}
  .chip-acct i{font-size:18px;}

  .tabs{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--outline);margin-top:16px;}
  .tabset{display:flex;}
  .tab{display:flex;align-items:center;gap:8px;padding:8px 16px 12px;font-weight:var(--fw-medium);font-size:var(--fs-body1);line-height:var(--lh-body1);color:var(--text-secondary);border-bottom:2px solid transparent;}
  .tab.active{color:var(--text-primary);border-bottom-color:var(--primary);}
  .tab.done .step-dot{background:var(--primary);}
  .step-dot{width:20px;height:20px;border-radius:9999px;background:var(--text-disabled);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .tab.active .step-dot{background:var(--primary);}
  .tab:not(.active):not(.done) .step-dot{background:var(--text-secondary);}
  .status-box{display:flex;align-items:center;gap:6px;font-size:14px;}
  .status-box .lbl{color:#6e7072;font-weight:500;}
  .status-pill{background:var(--indigo-bg);color:var(--indigo-text);font-weight:500;border-radius:9999px;padding:3px 10px;font-size:14px;}

  .content-area{padding:24px;display:flex;flex-direction:column;align-items:center;}

  /* Getting started tab */
  .gs-wrap{width:100%;max-width:1055px;display:flex;flex-direction:column;gap:24px;}
  .hero-card{display:flex;gap:32px;align-items:stretch;background:var(--paper);border:1px solid var(--outline-strong);border-radius:10px;padding:16px;min-height:220px;}
  .hero-text{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;gap:24px;padding:16px;}
  .hero-title{font-size:20px;line-height:24px;font-weight:var(--fw-semibold);letter-spacing:-.2px;margin:0 0 8px;}
  .hero-body{font-size:var(--fs-body1);line-height:var(--lh-body1);margin:0;color:var(--text-primary);}
  .link-strong{font-size:var(--fs-body2);line-height:var(--lh-body2);font-weight:var(--fw-semibold);color:var(--text-primary);text-decoration:underline;cursor:pointer;align-self:flex-start;}
  .hero-img{flex:1;min-width:0;border-radius:10px;overflow:hidden;display:flex;}
  .hero-img svg{display:block;width:100%;height:100%;object-fit:cover;}

  .gs-cols{display:flex;gap:24px;align-items:flex-start;}
  .gs-card{flex:1;min-width:0;background:var(--paper);border:1px solid var(--outline);border-radius:10px;padding:32px;display:flex;flex-direction:column;gap:24px;}
  .gs-h{font-size:20px;line-height:24px;font-weight:var(--fw-semibold);letter-spacing:-.2px;margin:0;display:flex;}
  .gs-step{display:flex;flex-direction:column;gap:2px;}
  .gs-step-title{font-size:var(--fs-body1);line-height:var(--lh-body1);font-weight:var(--fw-medium);}
  .gs-step-body{font-size:var(--fs-body1);line-height:var(--lh-body1);color:var(--text-secondary);padding-left:20px;}
  .faq-list{display:flex;flex-direction:column;gap:12px;}
  .faq{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--bg-default,#fafafa);border:1px solid var(--outline);border-radius:6px;padding:12px 16px;text-align:left;width:100%;}
  .faq-q{font-size:var(--fs-body1);line-height:var(--lh-body1);font-weight:var(--fw-medium);color:var(--text-primary);}
  .faq-chev{font-size:20px;color:var(--text-secondary);transition:transform .2s;flex-shrink:0;}
  .faq-a{font-size:var(--fs-body2);line-height:var(--lh-body2);color:var(--text-secondary);max-height:0;overflow:hidden;padding:0 16px;transition:max-height .2s,padding .2s;}
  .faq-a.open{max-height:200px;padding:8px 16px 12px;}
  .survey-wrap{width:100%;max-width:1055px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .autosave{display:flex;align-items:center;gap:4px;font-size:14px;}
  .autosave i{font-size:18px;color:var(--primary);} .autosave .info{font-size:14px;color:var(--text-secondary);}
  .card{width:100%;background:var(--paper);border:1px solid var(--outline);border-radius:var(--radius-md);overflow:hidden;}
  .progressbar{height:4px;background:var(--grey200);}
  .progressbar > div{height:100%;background:var(--primary);transition:width .3s ease;}

  /* Stepper */
  .stepper{display:flex;align-items:center;gap:8px;padding:32px 24px 0;}
  .step{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .step .num{width:24px;height:24px;border-radius:9999px;background:var(--text-disabled);color:#fff;font-size:var(--fs-caption);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step.active .num,.step.done .num{background:var(--primary);}
  .step .stxt{font-size:var(--fs-body2);line-height:var(--lh-body2);color:var(--text-secondary);white-space:nowrap;}
  .step.active .stxt{color:var(--text-primary);font-weight:500;}
  .step .scount{font-size:var(--fs-caption);line-height:var(--lh-caption);color:var(--text-primary);}
  .connector{flex:1;height:1px;background:var(--connector);min-width:16px;}

  .panel{padding:32px 24px 24px;display:flex;flex-direction:column;gap:24px;}
  .panel h2{font-size:var(--fs-body1);line-height:var(--lh-body1);font-weight:var(--fw-semibold);margin:0;}
  .alert{display:flex;align-items:flex-start;gap:8px;background:var(--info-bg);border:1px solid var(--info-border);border-radius:var(--radius-xs);padding:8px 16px;color:var(--info-text);font-size:var(--fs-body2);line-height:var(--lh-body2);}
  .alert i.lead{font-size:20px;flex-shrink:0;margin-top:8px;} .alert .txt{padding:8px 0;flex:1;} .alert b{font-weight:500;}
  .alert .close{margin-left:auto;background:none;border:none;color:var(--info-text);font-size:18px;padding:5px;border-radius:9999px;opacity:.7;}

  /* Radio cards */
  .radio-card{display:flex;align-items:center;gap:8px;height:54px;padding:8px 12px;border:1px solid var(--outline-strong);border-radius:var(--radius-btn);background:var(--paper);width:420px;}
  .radio-card.sel{background:var(--green-50);border-color:var(--green-400);}
  .radio-card .lbl{font-size:var(--fs-body2);line-height:var(--lh-body2);}
  .radio-card .chip{background:var(--green-chip);color:#0f6e2e;border-radius:9999px;padding:2px 10px;font-size:13px;}
  .radio-card .radio{margin-left:auto;width:20px;height:20px;border-radius:50%;border:2px solid var(--text-secondary);position:relative;flex-shrink:0;}
  .radio-card.sel .radio{border-color:var(--primary);}
  .radio-card.sel .radio::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--primary);}
  .accordion{display:flex;align-items:center;font-weight:var(--fw-medium);font-size:var(--fs-body1);line-height:var(--lh-body1);background:none;border:none;padding:8px 0;color:var(--text-primary);}
  .accordion i{font-size:24px;}

  .card-foot{border-top:1px solid var(--outline);display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 16px;}
  .foot-left{display:flex;align-items:center;gap:12px;font-size:var(--fs-body2);line-height:var(--lh-body2);color:var(--text-primary);}
  .foot-right{display:flex;gap:16px;margin-left:auto;}
  .progress-circ{width:28px;height:28px;border-radius:50%;display:inline-block;position:relative;}
  .progress-circ::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--paper);}

  /* ---------- Question step ---------- */
  .q-block{display:flex;flex-direction:column;gap:24px;}
  .q-head{display:flex;flex-direction:column;gap:16px;}
  .q-text{font-size:var(--fs-body1);line-height:var(--lh-body1);font-weight:var(--fw-semibold);max-width:900px;}
  .scope-chip{align-self:flex-start;background:var(--grey200);color:var(--text-primary);border-radius:9999px;padding:4px 12px;font-size:var(--fs-chip);line-height:var(--lh-chip);}

  .bulk-callout{display:flex;align-items:center;gap:12px;background:#f5f5f5;border-radius:8px;padding:16px;}
  .bulk-callout > i{font-size:22px;color:var(--text-secondary);flex-shrink:0;}
  .bulk-txt{display:flex;flex-direction:column;gap:2px;}
  .bulk-txt .lbl{font-size:var(--fs-body1);line-height:var(--lh-body1);font-weight:var(--fw-semibold);}
  .bulk-txt .hint{font-size:var(--fs-body2);line-height:var(--lh-body2);color:var(--text-secondary);}
  .bulk-toggle{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .bulk-label{font-size:var(--fs-body1);line-height:var(--lh-body1);font-weight:var(--fw-medium);}
  .switch{width:40px;height:22px;border-radius:9999px;background:var(--grey400);position:relative;border:none;flex-shrink:0;transition:background .2s;}
  .switch.on{background:var(--primary);}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;}
  .switch.on::after{left:20px;}

  .yesno-stack{display:flex;flex-direction:column;gap:12px;max-width:540px;}
  .answer-card{display:flex;align-items:center;gap:12px;height:56px;padding:8px 16px;border:1px solid var(--outline-strong);border-radius:8px;background:var(--paper);text-align:left;}
  .answer-card.sel{background:var(--green-50);border-color:var(--green-400);}
  .answer-icon{font-size:20px;color:var(--text-secondary);}
  .answer-card.sel .answer-icon{color:#0f6e2e;}
  .answer-lbl{font-size:var(--fs-body2);line-height:var(--lh-body2);}
  .answer-card .radio{margin-left:auto;width:20px;height:20px;border-radius:50%;border:2px solid var(--text-secondary);position:relative;flex-shrink:0;}
  .answer-card .radio.on{border-color:var(--primary);}
  .answer-card .radio.on::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--primary);}

  /* Per-entity DataGrid */
  .datagrid{display:flex;flex-direction:column;gap:16px;}
  .grid-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .search{display:flex;align-items:center;gap:8px;border:1px solid var(--outline-strong);border-radius:var(--radius-btn);padding:8px 14px;width:240px;background:var(--paper);height:44px;}
  .search i{font-size:18px;color:var(--text-secondary);}
  .search input{border:none;outline:none;font-family:inherit;font-size:var(--fs-body2);line-height:var(--lh-body2);flex:1;background:transparent;color:var(--text-primary);}
  .search input::placeholder{color:var(--text-secondary);}
  .select-wrap{position:relative;}
  .select-box{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--outline-strong);border-radius:var(--radius-btn);padding:8px 14px;font-size:var(--fs-body2);line-height:var(--lh-body2);color:var(--text-secondary);background:var(--paper);width:200px;height:44px;cursor:pointer;}
  .select-box.active{border-color:var(--primary);color:var(--text-primary);font-weight:500;background:var(--green-50);}
  .select-box i{font-size:18px;}
  .select-box .clear-x{color:var(--text-secondary);}
  .filter-menu{position:absolute;top:48px;left:0;z-index:20;background:var(--paper);border:1px solid var(--outline);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:200px;max-height:280px;overflow-y:auto;padding:4px;}
  .filter-opt{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;background:none;border:none;padding:10px 12px;font-size:14px;color:var(--text-primary);border-radius:6px;}
  .filter-opt:hover{background:#f5f5f5;}
  .filter-opt.sel{color:var(--primary);font-weight:500;}
  .filter-opt i{font-size:16px;color:var(--primary);}
  .clear-filters{background:none;border:none;color:var(--primary);font-size:14px;font-weight:500;text-decoration:underline;padding:8px;}
  .result-meta{font-size:13px;color:var(--text-secondary);}
  .no-results{text-align:center;color:var(--text-secondary);padding:32px 12px;font-size:var(--fs-body2);line-height:var(--lh-body2);}

  .ent-table{width:100%;border-collapse:collapse;font-size:var(--fs-body2);line-height:var(--lh-body2);border:1px solid var(--outline);border-radius:8px;overflow:hidden;}
  .ent-table th{text-align:left;font-weight:var(--fw-medium);color:var(--text-primary);font-size:var(--fs-body2);line-height:var(--lh-body2);padding:14px 16px;border-bottom:1px solid var(--outline);background:#fafafa;}
  .ent-table td{padding:14px 16px;border-bottom:1px solid var(--outline);vertical-align:middle;}
  .ent-table tbody tr:last-child td{border-bottom:none;}
  .cb-cell{width:48px;}
  .cbox{width:20px;height:20px;border:1.5px solid var(--grey400);border-radius:4px;background:var(--paper);display:flex;align-items:center;justify-content:center;color:#fff;padding:0;}
  .cbox.on{background:var(--primary);border-color:var(--primary);}
  .cbox i{font-size:14px;}
  .ent-placeholder{display:inline-flex;align-items:center;gap:8px;background:#ededed;color:var(--text-secondary);border-radius:6px;padding:6px 12px;font-size:var(--fs-body2);line-height:var(--lh-body2);}
  .ent-placeholder i{font-size:16px;}
  .cell-muted{color:var(--text-secondary);}
  .answer-cell{display:flex;gap:0;justify-content:flex-end;}
  .ans-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--paper);border:1px solid var(--outline-strong);font-size:var(--fs-body2);line-height:var(--lh-body2);color:var(--text-primary);}
  .ans-btn:first-child{border-radius:6px 0 0 6px;border-right:none;}
  .ans-btn:last-child{border-radius:0 6px 6px 0;}
  .ans-btn i{font-size:16px;color:var(--text-secondary);}
  .ans-btn.ans-yes{background:var(--green-50);border-color:var(--green-400);color:#0f6e2e;font-weight:500;z-index:1;}
  .ans-btn.ans-yes i{color:#0f6e2e;}
  .ans-btn.ans-no{background:#fdecea;border-color:#e69995;color:#b3261e;font-weight:500;z-index:1;}
  .ans-btn.ans-no i{color:#b3261e;}

  /* Bulk selection action bar */
  .bulk-action-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--green-50);border:1px solid var(--green-400);border-radius:8px;padding:10px 16px;}
  .bulk-count{display:flex;align-items:center;gap:8px;font-size:var(--fs-body2);line-height:var(--lh-body2);font-weight:var(--fw-medium);color:#0f6e2e;}
  .bulk-count i{font-size:18px;}
  .bulk-actions{display:flex;align-items:center;gap:8px;}
  .bulk-apply-lbl{font-size:var(--fs-body2);line-height:var(--lh-body2);color:var(--text-secondary);margin-right:4px;}
  .bulk-action-bar .ans-btn{border-radius:6px;border:1px solid var(--outline-strong);background:var(--paper);}
  .bulk-action-bar .ans-btn:first-child,.bulk-action-bar .ans-btn:last-child{border-radius:6px;border-right:1px solid var(--outline-strong);}
  .bulk-clear{background:none;border:none;color:var(--text-secondary);font-size:14px;text-decoration:underline;padding:8px;}

  .placeholder-note{font-size:13px;color:var(--text-disabled);font-style:italic;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div>

      <div class="scroll" id="scroll">
        <div class="header">
          <div class="h-title">
            <h1>Emission sources and data collection plan</h1>
            <i class="ti ti-chevron-down" style="font-size:24px;color:var(--text-secondary)"></i>
            <span class="chip-acct"><i class="ti ti-world"></i>Acme group</span>
          </div>
          <div class="tabs">
            <div class="tabset" id="tabset"></div>
            <div class="status-box"><span class="lbl">Status:</span><span class="status-pill">In progress</span></div>
          </div>
        </div>

        <div class="content-area" id="contentArea"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ----------------- Data model ----------------- */
const COUNTRIES = [
  {country:"France",flag:"🇫🇷"},{country:"Germany",flag:"🇩🇪"},{country:"Spain",flag:"🇪🇸"},
  {country:"United Kingdom",flag:"🇬🇧"},{country:"Italy",flag:"🇮🇹"},{country:"Netherlands",flag:"🇳🇱"},
  {country:"Switzerland",flag:"🇨🇭"},{country:"Sweden",flag:"🇸🇪"},{country:"Belgium",flag:"🇧🇪"},
  {country:"Poland",flag:"🇵🇱"},{country:"Portugal",flag:"🇵🇹"},{country:"Denmark",flag:"🇩🇰"},
];
const INDUSTRIES = ["Technology","Manufacturing","Transport and logistics","Retail","Food and beverage","Energy","Pharmaceuticals","Construction","Professional services"];
const SUFFIXES = {France:"SAS",Germany:"GmbH",Spain:"S.L.","United Kingdom":"Ltd",Italy:"S.r.l.",Netherlands:"BV",Switzerland:"AG",Sweden:"AB",Belgium:"SA",Poland:"Sp. z o.o.",Portugal:"Lda",Denmark:"ApS"};
const UNITS = ["Manufacturing","Logistics","Retail","Tech Solutions","Foods","Energy","Pharma","Construction","Services","Digital","Textiles","Operations","Trading","Mobility","Materials","Systems"];
const ENTITIES = (()=>{
  const out=[]; let ci=0,ui=0,ii=0;
  for(let i=0;i<32;i++){
    const c=COUNTRIES[ci%COUNTRIES.length];
    const unit=UNITS[ui%UNITS.length];
    out.push({
      name:"Acme "+unit+" "+(SUFFIXES[c.country]||""),
      country:c.country, flag:c.flag, industry:INDUSTRIES[ii%INDUSTRIES.length]
    });
    ci++;ui++;ii++;
  }
  return out;
})();

/* Scopes (steps). Real copy where provided; placeholders elsewhere. */
const SCOPES = [
  { key:"setup", label:"Set up" },
  { key:"direct", label:"Direct emissions", questions:[
      { id:"d1", text:"Does your organization/entities perform production processes that directly emit greenhouse gases?", chip:"Scope 1 - Direct emissions", real:true },
  ]},
  { key:"downstream", label:"Indirect downstream", questions:[
      { id:"ds1", text:"Does your organization/entities sell products or services that consume fossil fuels and/or electricity, or that directly emits greenhouse gases?", chip:"Scope 3.11 - Use of product sold", real:true },
      { id:"ds2", text:"Does your organization sell products that need to be disposed of at the end of their lifetime?", chip:"Scope 3.12 - End-of-life treatment of sold products", real:true },
  ]},
  { key:"upstream", label:"Indirect upstream", questions:[
      { id:"us1", text:"Do your employees undertake business travel as part of their job responsibilities?", chip:"Scope 3.6 - Business travel", real:true },
      { id:"us2", text:"Do you own vehicles or have long term vehicle leases?", chip:"Scope 1 - Mobile combustion", real:true },
  ]},
  { key:"summary", label:"Summary" },
];

/* ----------------- State ----------------- */
const state = {
  activeTab: "started",    // "started" | "survey" | "plan"
  stepIndex: 0,            // index into SCOPES
  qIndex: 0,               // index of current question within the scope
  delegation: "answer",    // "answer" | "delegate"
  answers: {},
  selected: new Set(),
  filters: { search:"", country:"", industry:"", answer:"" },
  openMenu: null,
};
SCOPES.forEach(s=>{ if(s.questions) s.questions.forEach(q=>{
  state.answers[q.id] = { bulk:true, bulkValue:null, perEntity:{} };
});});

/* ----------------- Render helpers ----------------- */
const tabsetEl = document.getElementById('tabset');
const topnavActionsEl = document.getElementById('topnavActions');
const contentAreaEl = document.getElementById('contentArea');
const scrollEl = document.getElementById('scroll');

function scopeCounts(scope){
  if(!scope.questions) return null;
  let answered=0;
  scope.questions.forEach(q=>{
    const a=state.answers[q.id];
    if(a.bulk){ if(a.bulkValue) answered++; }
    else { const vals=Object.values(a.perEntity); if(vals.length===ENTITIES.length && vals.every(v=>v)) answered++; }
  });
  return {answered, total:scope.questions.length};
}

function renderStepper(){
  let html='';
  SCOPES.forEach((s,i)=>{
    const cls='step'+(i===state.stepIndex?' active':'')+(i<state.stepIndex?' done':'');
    const num = i<state.stepIndex ? '<i class="ti ti-check" style="font-size:14px"></i>' : (i+1);
    const counts=scopeCounts(s);
    html+=`<div class="${cls}" style="cursor:pointer" onclick="goToStep(${i})">
        <div class="num">${num}</div>
        <div><div class="stxt">${s.label}</div>${counts?`<div class="scount">${counts.answered}/${counts.total}</div>`:''}</div>
      </div>`;
    if(i<SCOPES.length-1) html+='<div class="connector"></div>';
  });
  return html;
}

function renderSetup(){
  return `
  <div class="panel">
    <h2>How would you like to complete this survey?</h2>
    <div class="alert">
      <i class="ti ti-bulb lead"></i>
      <div class="txt"><b>Tip:</b> If your entities share similar activities and you're familiar with how they operate, we recommend answering the survey yourself. Delegating the survey means each entity will choose their own data collection modules, tailoring what activity data they collect.</div>
      <button class="close" onclick="this.parentElement.style.display='none'"><i class="ti ti-x"></i></button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="radio-card ${state.delegation==='answer'?'sel':''}" onclick="setDelegation('answer')">
        <span class="lbl">Answer for all entities</span>
        <span class="chip">Recommended</span>
        <span class="radio"></span>
      </div>
      <div class="radio-card ${state.delegation==='delegate'?'sel':''}" onclick="setDelegation('delegate')">
        <span class="lbl">Delegate all to entities</span>
        <span class="radio"></span>
      </div>
    </div>
    <button class="accordion">See survey preview <i class="ti ti-chevron-down"></i></button>
  </div>`;
}

function renderScope(scope){
  const q = scope.questions[state.qIndex];
  const a = state.answers[q.id];
  let html='<div class="panel">';
  html+=`<div class="q-block">
      <div class="q-head">
        <div class="q-text">${q.text}</div>
        <div class="scope-chip">${q.chip}</div>
        ${q.real?'':'<div class="placeholder-note">Placeholder — final copy to be added</div>'}
      </div>`;

  // Bulk-answer callout
  html+=`<div class="bulk-callout">
      <i class="ti ti-rocket"></i>
      <div class="bulk-txt">
        <div class="lbl">Apply the same answer to all ${ENTITIES.length} entities</div>
        <div class="hint">Switch off to set different answers for specific entities</div>
      </div>
      <div class="bulk-toggle">
        <button class="switch ${a.bulk?'on':''}" onclick="toggleBulk('${q.id}')" aria-label="Bulk answer"></button>
        <span class="bulk-label">Bulk answer</span>
      </div>
    </div>`;

  if(a.bulk){
    html+=`<div class="yesno-stack">
      <button class="answer-card ${a.bulkValue==='yes'?'sel':''}" onclick="setBulkValue('${q.id}','yes')">
        <i class="ti ti-check answer-icon"></i><span class="answer-lbl">Yes</span>
        <span class="radio ${a.bulkValue==='yes'?'on':''}"></span>
      </button>
      <button class="answer-card ${a.bulkValue==='no'?'sel':''}" onclick="setBulkValue('${q.id}','no')">
        <i class="ti ti-x answer-icon"></i><span class="answer-lbl">No</span>
        <span class="radio ${a.bulkValue==='no'?'on':''}"></span>
      </button>
    </div>`;
  } else {
    html+=renderEntityTable(q.id);
  }
  html+='</div></div>';
  return html;
}

function renderEntityTable(qid){
  const a=state.answers[qid];
  const f=state.filters;
  const visible = ENTITIES.filter(e=>{
    if(f.search && !(e.name.toLowerCase().includes(f.search.toLowerCase())||e.country.toLowerCase().includes(f.search.toLowerCase())||e.industry.toLowerCase().includes(f.search.toLowerCase()))) return false;
    if(f.country && e.country!==f.country) return false;
    if(f.industry && e.industry!==f.industry) return false;
    if(f.answer==='Answered' && !a.perEntity[e.name]) return false;
    if(f.answer==='Unanswered' && a.perEntity[e.name]) return false;
    return true;
  });
  const visibleNames = new Set(visible.map(e=>e.name));
  const allVisibleSelected = visible.length>0 && visible.every(e=>state.selected.has(e.name));
  let rows='';
  visible.forEach((e)=>{
    const v=a.perEntity[e.name]||null;
    const checked=state.selected.has(e.name);
    rows+=`<tr data-entity="${e.name}">
      <td class="cb-cell"><button class="cbox ${checked?'on':''}" onclick="toggleRowSelect('${e.name.replace(/'/g,"\\'")}')" aria-label="Select row">${checked?'<i class="ti ti-check"></i>':''}</button></td>
      <td><span class="ent-placeholder"><i class="ti ti-table"></i>${e.name}</span></td>
      <td class="cell-muted">${e.country}</td>
      <td class="cell-muted">${e.industry}</td>
      <td class="answer-cell">
        <button class="ans-btn ${v==='yes'?'ans-yes':''}" onclick="setEntityValue('${qid}','${e.name.replace(/'/g,"\\'")}','yes')"><i class="ti ti-check"></i>Yes</button>
        <button class="ans-btn ${v==='no'?'ans-no':''}" onclick="setEntityValue('${qid}','${e.name.replace(/'/g,"\\'")}','no')"><i class="ti ti-x"></i>No</button>
      </td>
    </tr>`;
  });
  if(visible.length===0){
    rows=`<tr><td colspan="5" class="no-results">No entities match these filters. <button class="bulk-clear" onclick="clearFilters()">Clear filters</button></td></tr>`;
  }

  const n=state.selected.size;
  const bulkBar = n>0 ? `<div class="bulk-action-bar">
      <span class="bulk-count"><i class="ti ti-checkbox"></i>${n} ${n===1?'entity':'entities'} selected</span>
      <div class="bulk-actions">
        <span class="bulk-apply-lbl">Set selected to:</span>
        <button class="ans-btn" onclick="applyToSelected('${qid}','yes')"><i class="ti ti-check"></i>Yes</button>
        <button class="ans-btn" onclick="applyToSelected('${qid}','no')"><i class="ti ti-x"></i>No</button>
        <button class="bulk-clear" onclick="clearSelection()">Clear</button>
      </div>
    </div>` : '';

  return `<div class="datagrid">
    <div class="grid-toolbar">
      <div class="search"><i class="ti ti-search"></i><input placeholder="Search entity..." value="${f.search}" oninput="setSearch(this.value)"></div>
      ${filterDropdown('country','Country', [...new Set(ENTITIES.map(e=>e.country))])}
      ${filterDropdown('industry','Industry', [...new Set(ENTITIES.map(e=>e.industry))])}
      ${filterDropdown('answer','Answer status', ['Answered','Unanswered'])}
      ${activeFilterCount()>0?`<button class="clear-filters" onclick="clearFilters()">Clear filters</button>`:''}
    </div>
    ${bulkBar}
    <div class="result-meta">${visible.length} of ${ENTITIES.length} entities</div>
    <table class="ent-table" id="table-${qid}">
      <thead><tr>
        <th class="cb-cell"><button class="cbox ${allVisibleSelected?'on':''}" onclick="toggleSelectAll('${qid}')" aria-label="Select all">${allVisibleSelected?'<i class="ti ti-check"></i>':''}</button></th>
        <th>Entity</th><th>Country</th><th>Industry</th><th>Answer</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function filterDropdown(key,label,options){
  const val=state.filters[key];
  const isOpen=state.openMenu===key;
  const display = val || label;
  const menu = isOpen ? `<div class="filter-menu">
      <button class="filter-opt ${!val?'sel':''}" onclick="setFilter('${key}','')">All</button>
      ${options.map(o=>`<button class="filter-opt ${val===o?'sel':''}" onclick="setFilter('${key}','${o.replace(/'/g,"\\'")}')">${o}${val===o?'<i class=\"ti ti-check\"></i>':''}</button>`).join('')}
    </div>` : '';
  return `<div class="select-wrap">
    <div class="select-box ${val?'active':''}" onclick="toggleMenu('${key}')">
      <span>${display}</span>
      ${val?`<i class="ti ti-x clear-x" onclick="event.stopPropagation();setFilter('${key}','')"></i>`:`<i class="ti ti-chevron-down"></i>`}
    </div>
    ${menu}
  </div>`;
}
function activeFilterCount(){
  const f=state.filters; return [f.country,f.industry,f.answer].filter(Boolean).length;
}

function renderSummary(){
  let rows='';
  SCOPES.filter(s=>s.questions).forEach(scope=>{
    const c=scopeCounts(scope);
    rows+=`<tr><td class="ent-name">${scope.label}</td><td>${c.answered}/${c.total} answered</td>
      <td>${c.answered===c.total?'<span style="color:#0f6e2e;font-weight:500"><i class="ti ti-circle-check"></i> Complete</span>':'<span style="color:#b3261e"><i class="ti ti-alert-circle"></i> Incomplete</span>'}</td></tr>`;
  });
  return `<div class="panel">
    <h2>Survey summary</h2>
    <div class="alert"><i class="ti ti-bulb lead"></i><div class="txt">Review your answers below. Once you submit, we'll generate the data collection plan based on the emission sources you confirmed.</div></div>
    <table class="ent-table">
      <thead><tr><th>Scope</th><th>Progress</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

/* ----------------- Actions ----------------- */
function setDelegation(v){ state.delegation=v; render(); }
function toggleBulk(qid){ state.answers[qid].bulk=!state.answers[qid].bulk; state.selected.clear();
  state.filters={search:"",country:"",industry:"",answer:""}; state.openMenu=null; render(); }
function setBulkValue(qid,v){ state.answers[qid].bulkValue = state.answers[qid].bulkValue===v?null:v; render(); }
function setEntityValue(qid,name,v){
  const pe=state.answers[qid].perEntity;
  pe[name] = pe[name]===v?null:v;
  render();
}
function toggleRowSelect(name){
  if(state.selected.has(name)) state.selected.delete(name); else state.selected.add(name);
  render();
}
function toggleSelectAll(qid){
  const a=state.answers[qid]; const f=state.filters;
  const visible = ENTITIES.filter(e=>{
    if(f.search && !(e.name.toLowerCase().includes(f.search.toLowerCase())||e.country.toLowerCase().includes(f.search.toLowerCase())||e.industry.toLowerCase().includes(f.search.toLowerCase()))) return false;
    if(f.country && e.country!==f.country) return false;
    if(f.industry && e.industry!==f.industry) return false;
    if(f.answer==='Answered' && !a.perEntity[e.name]) return false;
    if(f.answer==='Unanswered' && a.perEntity[e.name]) return false;
    return true;
  });
  const allSel = visible.length>0 && visible.every(e=>state.selected.has(e.name));
  if(allSel) visible.forEach(e=>state.selected.delete(e.name));
  else visible.forEach(e=>state.selected.add(e.name));
  render();
}
function clearSelection(){ state.selected.clear(); render(); }
function applyToSelected(qid,v){
  const pe=state.answers[qid].perEntity;
  state.selected.forEach(name=>{ pe[name]=v; });
  state.selected.clear();
  render();
}
function setSearch(v){ state.filters.search=v; renderTableOnly(); }
function setFilter(key,val){ state.filters[key]=val; state.openMenu=null; render(); }
function toggleMenu(key){ state.openMenu = state.openMenu===key?null:key; render(); }
function clearFilters(){ state.filters={search:"",country:"",industry:"",answer:""}; state.openMenu=null; render(); }

// re-render only the table area so the search input keeps focus
function renderTableOnly(){
  const scope=SCOPES[state.stepIndex];
  if(!scope.questions) return;
  const q=scope.questions[state.qIndex];
  if(state.answers[q.id].bulk) return;
  const container=document.querySelector('.datagrid');
  if(!container) return;
  const active=document.activeElement;
  const caret=active&&active.tagName==='INPUT'?active.selectionStart:null;
  container.outerHTML=renderEntityTable(q.id);
  const newInput=document.querySelector('.search input');
  if(newInput && active && active.tagName==='INPUT'){ newInput.focus(); if(caret!=null) newInput.setSelectionRange(caret,caret); }
  updateFooter();
}

// answered count for current question (used in footer)
function questionAnswered(q){
  const a=state.answers[q.id];
  if(a.bulk) return a.bulkValue ? ENTITIES.length : 0;
  return Object.values(a.perEntity).filter(v=>v).length;
}

function goToStep(i){
  if(i<0||i>SCOPES.length-1) return;
  state.stepIndex=i;
  state.qIndex=0;
  state.selected.clear();
  state.filters={search:"",country:"",industry:"",answer:""}; state.openMenu=null;
  render();
  scrollEl.scrollTop=0;
}

// advance one question; roll into next scope when at the last question
function advance(){
  const scope=SCOPES[state.stepIndex];
  state.selected.clear();
  state.filters={search:"",country:"",industry:"",answer:""}; state.openMenu=null;
  if(scope.questions && state.qIndex < scope.questions.length-1){
    state.qIndex++; render(); scrollEl.scrollTop=0;
  } else if(state.stepIndex < SCOPES.length-1){
    goToStep(state.stepIndex+1);
  }
}
function goBack(){
  const scope=SCOPES[state.stepIndex];
  state.selected.clear();
  state.filters={search:"",country:"",industry:"",answer:""}; state.openMenu=null;
  if(scope.questions && state.qIndex>0){
    state.qIndex--; render(); scrollEl.scrollTop=0;
  } else if(state.stepIndex>0){
    const prev=SCOPES[state.stepIndex-1];
    state.stepIndex--;
    state.qIndex = prev.questions ? prev.questions.length-1 : 0;
    render(); scrollEl.scrollTop=0;
  }
}

  </svg>`;
}

/* ----------------- Collection plan (placeholder) ----------------- */
function renderPlanPlaceholder(){
  return `<div class="gs-wrap"><div class="gs-card" style="text-align:center;padding:64px 32px;">
    <h2 class="gs-h" style="justify-content:center;">Collection plan</h2>
    <p class="hero-body" style="color:var(--text-secondary)">This tab is next on the list. The module-selection interface (Plan and Summary by entity tables) will live here.</p>
  </div></div>`;
}

/* ----------------- Master render ----------------- */
const TABS=[{key:"started",n:1,label:"Getting started"},{key:"survey",n:2,label:"Survey"},{key:"plan",n:3,label:"Collection plan"}];

function setTab(key){ state.openMenu=null; state.activeTab=key; render(); scrollEl.scrollTop=0; }

function renderTabs(){
  return TABS.map((t,i)=>{
    const active=state.activeTab===t.key;
    const done = TABS.findIndex(x=>x.key===state.activeTab) > i;
    return `<div class="tab ${active?'active':''} ${done?'done':''}" onclick="setTab('${t.key}')">
      <span class="step-dot">${done?'<i class="ti ti-check" style="font-size:13px"></i>':t.n}</span>${t.label}</div>`;
  }).join('');
}

function footerInner(){
  const scope=SCOPES[state.stepIndex];
  let left='', right='';
  if(scope.questions){
    const q=scope.questions[state.qIndex];
    const ans=questionAnswered(q);
    const pct=Math.round((ans/ENTITIES.length)*100);
    const ring = ans===ENTITIES.length
      ? '<i class="ti ti-circle-check" style="font-size:28px;color:var(--primary)"></i>'
      : `<span class="progress-circ" style="background:conic-gradient(var(--primary) ${pct*3.6}deg, var(--grey200) 0)"></span>`;
    left=`<div class="foot-left">${ring}<span>${ans}/${ENTITIES.length} entities answered</span></div>`;
  }
  if(scope.key==='setup'){
    right=`<button class="btn btn-primary" onclick="advance()">Continue<i class="ti ti-chevron-right"></i></button>`;
  } else if(scope.key==='summary'){
    right=`<button class="btn btn-outline" onclick="goBack()"><i class="ti ti-chevron-left"></i>Back</button>
           <button class="btn btn-primary" onclick="setTab('plan')">Submit answers</button>`;
  } else {
    right=`<button class="btn btn-outline" onclick="goBack()"><i class="ti ti-chevron-left"></i>Back</button>
           <button class="btn btn-primary" onclick="advance()">Continue<i class="ti ti-chevron-right"></i></button>`;
  }
  return `${left}<div class="foot-right">${right}</div>`;
}

function updateFooter(){
  const f=document.querySelector('#cardFoot');
  if(f) f.innerHTML=footerInner();
}

function renderSurveyTab(){
  const scope=SCOPES[state.stepIndex];
  let content;
  if(scope.key==='setup') content=renderSetup();
  else if(scope.key==='summary') content=renderSummary();
  else content=renderScope(scope);
  const pct=Math.round((state.stepIndex/(SCOPES.length-1))*100);
  return `<div class="survey-wrap">
    <div class="autosave"><i class="ti ti-circle-check"></i>Auto-save<i class="ti ti-info-circle info"></i></div>
    <div class="card">
      <div class="progressbar"><div style="width:${pct}%"></div></div>
      <div class="stepper">${renderStepper()}</div>
      <div id="stepContent">${content}</div>
      <div class="card-foot" id="cardFoot">${footerInner()}</div>
    </div>
  </div>`;
}

function topnavActions(){
  if(state.activeTab==='started'){
    return `<button class="btn btn-primary" onclick="setTab('survey')">Continue<i class="ti ti-chevron-right"></i></button>`;
  }
  if(state.activeTab==='survey'){
    const onSummary = SCOPES[state.stepIndex].key==='summary';
    return `<button class="btn btn-outline" onclick="setTab('started')"><i class="ti ti-chevron-left"></i>Back</button>
            <button class="btn ${onSummary?'btn-primary':'btn-disabled'}" ${onSummary?"onclick=\"setTab('plan')\"":''}>Submit answers</button>`;
  }
  return `<button class="btn btn-outline" onclick="setTab('survey')"><i class="ti ti-chevron-left"></i>Back</button>`;
}

function render(){
  tabsetEl.innerHTML=renderTabs();
  topnavActionsEl.innerHTML=topnavActions();
  if(state.activeTab==='started') contentAreaEl.innerHTML=renderGettingStarted();
  else if(state.activeTab==='survey') contentAreaEl.innerHTML=renderSurveyTab();
  else contentAreaEl.innerHTML=renderPlanPlaceholder();
}
render();

document.addEventListener('click',(e)=>{
  if(state.openMenu && !e.target.closest('.select-wrap')){
    state.openMenu=null; render();
  }
});
</script>
</body>
</html>
